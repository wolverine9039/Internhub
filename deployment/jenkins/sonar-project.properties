# ─── SonarQube Project Configuration ─────────────────────────
# Used by SonarScanner during Jenkins pipeline analysis

# Project Identification
sonar.projectKey=internhub
sonar.projectName=InternHub
sonar.projectVersion=1.0.0


# Source Directories
sonar.sources=backend/src,frontend/src

# Exclusions (don't scan these)
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  **/coverage/**,\
  **/*.test.js,\
  **/*.spec.js,\
  **/tests/**,\
  **/__mocks__/**,\
  **/docker/**,\
  **/deployment/**

# Test Directories
sonar.tests=backend/tests
sonar.test.inclusions=**/*.test.js,**/*.spec.js

# Coverage Reports (generated by Jest)
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# Language Settings
sonar.language=js
sonar.sourceEncoding=UTF-8

# Quality Gate
sonar.qualitygate.wait=true
