# ─── InternHub Infrastructure Inventory ───────────────────────
# Update the IP addresses with your actual EC2 public IPs
# Ensure the SSH key path points to your .pem file

[ci_cd]
# EC2 #1 — Jenkins + Ansible Server
jenkins-server ansible_host=<CI_CD_SERVER_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/internhub-key.pem

[sonarqube]
# EC2 #2 — SonarQube Quality Server
sonar-server ansible_host=<SONARQUBE_SERVER_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/internhub-key.pem

[app_server]
# EC2 #3 — Application Server (Frontend + Backend containers)
app-server ansible_host=<APP_SERVER_IP> ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/internhub-key.pem

[all:vars]
ansible_python_interpreter=/usr/bin/python3
github_repo=https://github.com/wolverine9039/Internhub.git
project_dir=/home/ubuntu/Internhub
domain_name=internhub.buildwithmayank.tech
